# ROCreader URL source configuration
# Path in release package: Roms/APPS/ROCreader/online_sources.ini
# Downloads directory: Roms/APPS/ROCreader/Downloads
#
# Release packages ship only this template file.
# To add a new connection source:
# 1. Copy the whole [source.template] block below.
# 2. Rename the copied section, for example [source.my_site].
# 3. Fill name, type, url, and category.* fields.
# 4. Set visible=1 and enabled=1 to show it in the URL menu.
#
# type supports:
# - opds: standard OPDS feed
# - kavita: Kavita OPDS-compatible feed
# - manual_web: site-specific HTML catalog parser
#
# Category rows are optional. Use category.0, category.1, category.2...
# The category name is shown on the online shelf navigation bar.

[source.template]
name=Template only - copy this block and fill a real source
type=opds
url=
visible=0
enabled=0
category.0.name=All
category.0.url=
category.1.name=Category Name
category.1.url=
